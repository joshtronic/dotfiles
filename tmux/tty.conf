set -g status-interval 30
set -g status-left '[#S] '
set -g status-right '#(nmcli -t -f active,ssid dev wifi 2>/dev/null | grep ^yes | cut -d: -f2 | grep . || echo "No wifi") | #(cat /sys/class/power_supply/BAT0/capacity)%% #(cat /sys/class/power_supply/BAT0/status) | %H:%M'
set -g status-right-length 60
