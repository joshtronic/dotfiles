general.import = ['~/.config/alacritty/themes/rose-pine-dawn.toml']

[window]
option_as_alt = 'Both'
padding.x = 5
padding.y = 5

[font]
normal.family = 'Fira Code'
bold.family = 'Fira Code'
italic.family = 'Fira Code'
bold_italic.family = 'Fira Code'
size = 12.0

# Cursor hacks, may delete
# [colors]
# cursor.text = '#faf4ed'
# cursor.cursor = '#eb6f92'

[env]
term = "xterm-256color"
